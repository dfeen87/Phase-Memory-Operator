  roc_auc: 0.8654
  pr_auc: 0.7821
  false_alarm_rate: 0.1123
  median_lead_time: 14.8
  detection_rate: 0.89
  
  perturbation_stability:
    noise_level: 0.1  # fraction of signal std
    n_trials: 5
    auc_std: 0.0234  # Stability across perturbations

